name: CI/CD pipeline for Dockerized FLask app

on:
    push:
        branches:[main]
    pull request:
        branches:[main]

jobs:
    build-and-test:
        runs-on: ubuntu-latest

        steps:
            - name: checkout code
              uses: actions/checkout@v3
            
            - name: setup python
              uses: actions/setup-python@v4
              with:
                python-version: '3.9'

            - name: install dependencies
              run:
                python -m pip install --upgrade pip
                pip install flask
                pip install pytest

            - name: run tests
              run:
                pytest
    bulid-and-publish:
        needs: build-and-test
        runs on: ubuntu-latest
             
